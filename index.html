<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AQA Physics: Newton's Second Law</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .btn-arm { padding: 15px; font-size: 1.2em; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; margin-top:10px; }
        .state-idle { background: #444; color: white; }
        .state-armed { background: #ffdd57; color: black; }
        .stats-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 0.75em; color: #00d1b2; text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .input-row { display: flex; gap: 15px; margin-bottom: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75em; color: #aaa; }
        .stepper { display: flex; align-items: center; gap: 5px; }
        .stepper button { width: 35px; height: 35px; background: #333; color: #00d1b2; border: 1px solid #00d1b2; border-radius: 4px; }
        .stepper input { width: 65px; text-align: center; background: #000; color: white; border: 1px solid #444; height: 32px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th { background: #333; color: #00d1b2; padding: 8px; }
        td { border: 1px solid #444; padding: 8px; text-align: center; }
        .fric-control { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #555; }
    </style>
</head>
<body>

<div class="card" style="display:flex; justify-content: space-between; align-items: center;">
    <div style="color: #ffdd57; font-weight: bold;">AQA RP7 (Newton's 2nd)</div>
    <button id="bleBtn" style="background:#00d1b2; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;" onclick="connectBLE()">CONNECT</button>
</div>

<div class="card">
    <div class="input-row">
        <div class="input-group">
            <label>HANGER MASS (kg)</label>
            <div class="stepper">
                <button onclick="step('hangerInput', -0.01)">-</button>
                <input type="number" id="hangerInput" value="0.05" step="0.01">
                <button onclick="step('hangerInput', 0.01)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>TOTAL SYSTEM MASS (kg)</label>
            <input type="number" id="totalMassInput" value="0.60" step="0.05" style="background:#000; color:#00d1b2; border:1px solid #444; height:32px; text-align:center; font-weight:bold;">
        </div>
    </div>

    <button id="armBtn" class="btn-arm state-idle" onclick="armSystem()">ARM PHOTOGATES</button>

    <div class="fric-control">
        <div style="font-size:0.8em;">Friction Compensation</div>
        <input type="checkbox" id="fricToggle" onchange="updateDisplay()" style="width:20px; height:20px; cursor:pointer;">
    </div>

    <div class="stats-box">
        <div><div class="stat-label">Slope</div><div id="statSlope" class="stat-val">0.00</div></div>
        <div><div class="stat-label">Trials</div><div id="statCount" class="stat-val">0</div></div>
        <div><div class="stat-label">Calc Mass</div><div id="statMean" class="stat-val">0.00</div></div>
        <button onclick="exportCSV()" style="background:#444; color:white; border:none; border-radius:4px; font-size:0.7em;">CSV</button>
    </div>

    <canvas id="physicsChart" style="max-height: 180px;"></canvas>

    <table>
        <thead>
            <tr><th>Hanger (kg)</th><th>Applied F (N)</th><th>Accel (m/s²)</th><th>X</th></tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>
</div>

<script>
    let commandChar, chart, rawData = [];
    const g = 9.8066;

    function step(id, amt) { 
        let el = document.getElementById(id); 
        el.value = Math.max(0, (parseFloat(el.value) + amt)).toFixed(3); 
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ 
                filters: [{ name: 'NanoPhys_S3' }], 
                optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"] 
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            const dataC = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            commandChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");
            document.getElementById('bleBtn').innerText = "LIVE";
            
            await dataC.startNotifications();
            dataC.addEventListener('characteristicvaluechanged', (e) => {
                const str = new TextDecoder().decode(e.target.value);
                if (str.startsWith("DAT:")) {
                    document.getElementById('armBtn').className = "btn-arm state-idle";
                    document.getElementById('armBtn').innerText = "ARM PHOTOGATES";
                    const [v1, v2, a] = str.substring(4).split(',').map(Number);
                    
                    const mH = parseFloat(document.getElementById('hangerInput').value);
                    const appliedF = mH * g;

                    rawData.push({ id: Date.now(), hanger: mH, appliedF: appliedF, accel: a });
                    updateDisplay();
                }
            });
        } catch (err) { console.log(err); }
    }

    function calculateLinearRegression(data, useFrictionComp) {
        if (data.length < 2) return { slope: 0, intercept: 0 };
        
        let n = data.length, sx = 0, sy = 0, sxy = 0, sx2 = 0;
        data.forEach(p => { sx += p.appliedF; sy += p.accel; sxy += p.appliedF * p.accel; sx2 += p.appliedF * p.appliedF; });
        
        let slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
        let intercept = (sy - slope * sx) / n;

        // Friction (X-intercept) is where accel (y) = 0. Solve 0 = slope * x + intercept -> x = -intercept / slope
        let frictionOffset = (slope !== 0) ? (-intercept / slope) : 0;
        
        return { slope, intercept, frictionOffset };
    }

    function updateDisplay() {
        const body = document.getElementById('dataBody');
        const useComp = document.getElementById('fricToggle').checked;
        body.innerHTML = "";

        const reg = calculateLinearRegression(rawData, useComp);
        const fOffset = useComp ? reg.frictionOffset : 0;

        rawData.forEach(p => {
            const netF = p.appliedF - fOffset;
            body.insertAdjacentHTML('afterbegin', `<tr><td>${p.hanger.toFixed(3)}</td><td>${netF.toFixed(3)}</td><td>${p.accel.toFixed(3)}</td><td><button onclick="remove(${p.id})">×</button></td></tr>`);
        });

        document.getElementById('statCount').innerText = rawData.length;
        document.getElementById('statSlope').innerText = reg.slope.toFixed(3);
        
        // Experimental Mass = 1 / slope
        document.getElementById('statMean').innerText = reg.slope > 0 ? (1 / reg.slope).toFixed(3) : "0.00";

        drawChart(rawData, reg, useComp);
    }

    function drawChart(data, reg, useComp) {
        if (chart) chart.destroy();
        const fOffset = useComp ? reg.frictionOffset : 0;
        const pts = data.map(p => ({ x: p.appliedF - fOffset, y: p.accel }));
        
        // If compensated, force through origin. If not, use calculated intercept.
        const lineData = useComp 
            ? [{ x: 0, y: 0 }, { x: Math.max(...pts.map(p => p.x), 1) * 1.1, y: reg.slope * (Math.max(...pts.map(p => p.x), 1) * 1.1) }]
            : [{ x: 0, y: reg.intercept }, { x: Math.max(...pts.map(p => p.x), 1) * 1.1, y: reg.slope * (Math.max(...pts.map(p => p.x), 1) * 1.1) + reg.intercept }];

        chart = new Chart(document.getElementById('physicsChart'), {
            type: 'scatter',
            data: { 
                datasets: [
                    { label: 'Data', data: pts, backgroundColor: '#00d1b2' },
                    { label: 'Fit', data: lineData, type: 'line', borderColor: '#ffdd57', pointRadius: 0, borderWidth: 1 }
                ]
            },
            options: { 
                scales: { 
                    x: { title: { display: true, text: useComp ? 'Net Force (N)' : 'Applied Force (N)', color: '#888' }, min: 0 },
                    y: { title: { display: true, text: 'Accel (m/s²)', color: '#888' }, min: 0 }
                }, 
                plugins: { legend: { display: false } } 
            }
        });
    }

    async function armSystem() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("ARM")); document.getElementById('armBtn').className="btn-arm state-armed"; document.getElementById('armBtn').innerText="WAITING..."; }
    function remove(id) { rawData = rawData.filter(p => p.id !== id); updateDisplay(); }
    function exportCSV() { 
        let csv = "Hanger_kg,Applied_F_N,Accel_ms2\n" + rawData.map(p => `${p.hanger},${p.appliedF},${p.accel}`).join("\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='Newton_Data.csv'; a.click();
    }
</script>
</body>
</html>
