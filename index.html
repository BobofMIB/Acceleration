<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AQA Physics: Newton's Second Law</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 12px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tabs button.active { background: #00d1b2; color: black; }
        .btn-arm { padding: 15px; font-size: 1.2em; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; }
        .state-idle { background: #444; color: white; }
        .state-armed { background: #ffdd57; color: black; }
        .stats-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 0.75em; color: #00d1b2; text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75em; color: #aaa; }
        .stepper { display: flex; align-items: center; gap: 5px; }
        .stepper button { width: 35px; height: 35px; background: #333; color: #00d1b2; border: 1px solid #00d1b2; border-radius: 4px; font-weight: bold; }
        .stepper input { width: 65px; text-align: center; background: #000; color: white; border: 1px solid #444; height: 32px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th { background: #333; color: #00d1b2; padding: 8px; }
        td { border: 1px solid #444; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card" style="display:flex; justify-content: space-between; align-items: center;">
    <div style="color: #ffdd57; font-weight: bold; font-size: 0.9em;">AQA RP7 SETUP</div>
    <button id="bleBtn" style="background:#00d1b2; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;" onclick="connectBLE()">CONNECT</button>
</div>

<div class="card">
    <div class="tabs">
        <button id="tabF" class="active" onclick="setMode('force')">1. Vary Force</button>
        <button id="tabM" onclick="setMode('mass')">2. Vary Mass</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
        <div class="input-group">
            <label id="mainInputLabel">HANGER MASS (kg)</label>
            <div class="stepper">
                <button onclick="step('mainInput', -0.01)">-</button>
                <input type="number" id="mainInput" value="0.10" step="0.01">
                <button onclick="step('mainInput', 0.01)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>CART MASS (kg)</label>
            <div class="stepper">
                <button onclick="step('cartInput', -0.05)">-</button>
                <input type="number" id="cartInput" value="0.50" step="0.05">
                <button onclick="step('cartInput', 0.05)">+</button>
            </div>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
        <div class="input-group">
            <label>FRICTION (N)</label>
            <input type="number" id="frictionInput" value="0.02" step="0.01" style="background:#000; color:#ffdd57; border:1px solid #444; height:32px; text-align:center;">
        </div>
        <div class="input-group">
            <label>SYSTEM TOTAL (kg)</label>
            <div id="totalDisplay" style="height:32px; display:flex; align-items:center; justify-content:center; background:#111; border-radius:4px; font-weight:bold; color:#00d1b2;">0.60</div>
        </div>
    </div>

    <button id="armBtn" class="btn-arm state-idle" onclick="armSystem()">ARM PHOTOGATES</button>

    <div class="stats-box">
        <div><div class="stat-label">Slope</div><div id="statSlope" class="stat-val">0.00</div></div>
        <div><div class="stat-label">Trials</div><div id="statCount" class="stat-val">0</div></div>
        <div><div class="stat-label" id="meanLabel">Exp. Mass</div><div id="statMean" class="stat-val">0.00</div></div>
        <button onclick="exportCSV()" style="background:#444; color:white; border:none; border-radius:4px; font-size:0.7em;">CSV</button>
    </div>

    <canvas id="physicsChart" style="max-height: 180px;"></canvas>

    <table>
        <thead>
            <tr><th>Hanger</th><th>Total M</th><th>Net F (N)</th><th>Accel</th><th>X</th></tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>
</div>

<script>
    let commandChar, chart, currentMode = 'force', forceData = [], massData = [];
    const g = 9.8066;

    // Listen for input changes to update Total Mass display
    document.getElementById('mainInput').addEventListener('input', updateTotal);
    document.getElementById('cartInput').addEventListener('input', updateTotal);

    function updateTotal() {
        let mH = parseFloat(document.getElementById('mainInput').value) || 0;
        let mC = parseFloat(document.getElementById('cartInput').value) || 0;
        document.getElementById('totalDisplay').innerText = (mH + mC).toFixed(3);
    }

    function step(id, amt) { 
        let el = document.getElementById(id); 
        el.value = Math.max(0, (parseFloat(el.value) + amt)).toFixed(3); 
        updateTotal();
    }

    async function setMode(m) {
        currentMode = m;
        document.getElementById('tabF').classList.remove('active');
        document.getElementById('tabM').classList.remove('active');
        document.getElementById(m === 'force' ? 'tabF' : 'tabM').classList.add('active');
        
        document.getElementById('mainInputLabel').innerText = m === 'force' ? "HANGER MASS (kg)" : "HANGER (CONSTANT)";
        document.getElementById('meanLabel').innerText = m === 'force' ? "EXP. MASS (kg)" : "EXP. FORCE (N)";
        updateDisplay();
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ 
                filters: [{ name: 'NanoPhys_S3' }], 
                optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"] 
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            const dataC = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            commandChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");
            document.getElementById('bleBtn').innerText = "LIVE";
            
            await dataC.startNotifications();
            dataC.addEventListener('characteristicvaluechanged', (e) => {
                const str = new TextDecoder().decode(e.target.value);
                if (str.startsWith("DAT:")) {
                    document.getElementById('armBtn').className = "btn-arm state-idle";
                    document.getElementById('armBtn').innerText = "ARM PHOTOGATES";
                    const [v1, v2, a] = str.substring(4).split(',').map(Number);
                    
                    const mH = parseFloat(document.getElementById('mainInput').value);
                    const mC = parseFloat(document.getElementById('cartInput').value);
                    const frict = parseFloat(document.getElementById('frictionInput').value);
                    
                    const totalM = mH + mC;
                    const netF = (mH * g) - frict;

                    const entry = { id: Date.now(), accel: a, hanger: mH, cart: mC, total: totalM, force: netF };
                    if (currentMode === 'force') forceData.push(entry); else massData.push(entry);
                    updateDisplay();
                }
            });
        } catch (err) { console.log(err); }
    }

    function updateDisplay() {
        const data = currentMode === 'force' ? forceData : massData;
        const body = document.getElementById('dataBody');
        body.innerHTML = "";
        let sumCalc = 0;

        data.forEach(p => {
            const calc = currentMode === 'force' ? (p.force / p.accel) : (p.total * p.accel);
            sumCalc += calc;
            body.insertAdjacentHTML('afterbegin', `<tr><td>${p.hanger.toFixed(2)}</td><td>${p.total.toFixed(2)}</td><td>${p.force.toFixed(3)}</td><td>${p.accel.toFixed(2)}</td><td><button onclick="remove(${p.id})">×</button></td></tr>`);
        });

        document.getElementById('statCount').innerText = data.length;
        document.getElementById('statMean').innerText = data.length > 0 ? (sumCalc / data.length).toFixed(3) : "0.00";
        
        if (data.length > 1) {
            let sx=0, sy=0, sxy=0, sx2=0;
            data.forEach(p => { 
                const x = currentMode === 'force' ? p.force : (1/p.total); 
                sx+=x; sy+=p.accel; sxy+=x*p.accel; sx2+=x*x; 
            });
            const slope = (data.length*sxy - sx*sy) / (data.length*sx2 - sx*sx);
            document.getElementById('statSlope').innerText = slope.toFixed(3);
            drawChart(data, slope);
        }
    }

    function drawChart(data, m) {
        if (chart) chart.destroy();
        const pts = data.map(p => ({x: currentMode==='force'?p.force:(1/p.total), y: p.accel}));
        chart = new Chart(document.getElementById('physicsChart'), {
            type: 'scatter',
            data: { datasets: [{ data: pts, backgroundColor: '#00d1b2' },
            { data: [{x:0,y:0},{x:Math.max(...pts.map(p=>p.x),1)*1.1, y:m*Math.max(...pts.map(p=>p.x),1)*1.1}], type:'line', borderColor:'#ffdd57', pointRadius:0, borderWidth:1 }]},
            options: { scales: { x: { title: { display:true, text: currentMode==='force'?'Net Force (N)':'1 / Total Mass (1/kg)', color: '#888'} }, y: { title: { display:true, text: 'Accel (m/s²)', color: '#888'} } }, plugins: { legend: { display: false } } }
        });
    }

    async function armSystem() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("ARM")); document.getElementById('armBtn').className="btn-arm state-armed"; document.getElementById('armBtn').innerText="WAITING..."; }
    function remove(id) { forceData = forceData.filter(p=>p.id!==id); massData = massData.filter(p=>p.id!==id); updateDisplay(); }
    function exportCSV() { 
        let csv = "Hanger_kg,Cart_kg,Total_kg,Net_Force_N,Accel_ms2\n" + (currentMode==='force'?forceData:massData).map(p=>`${p.hanger},${p.cart},${p.total},${p.force},${p.accel}`).join("\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='Newton_Exp.csv'; a.click();
    }
</script>
</body>
</html>
