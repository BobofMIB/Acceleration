<div id="phUI">
    <div class="live-ph" id="phDisplay">--.-</div>
    <div style="color:#00d1b2; font-weight:bold; letter-spacing: 2px; margin-bottom:20px;">pH UNITS</div>

    <div class="card" style="text-align:left; background:#111;">
        <h4 style="margin:0 0 10px 0; color:#ffdd57;">Two-Point Calibration</h4>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" id="cal1Ph" value="7.0" style="width:50px;">
            <button onclick="captureCal(1)" style="flex:1;">Sample Buffer 1</button>
            <span id="raw1">---</span>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="number" id="cal2Ph" value="4.0" style="width:50px;">
            <button onclick="captureCal(2)" style="flex:1;">Sample Buffer 2</button>
            <span id="raw2">---</span>
        </div>
        <button onclick="calculateCalibration()" style="width:100%; padding:10px; background:#00d1b2; color:black; font-weight:bold; border:none; border-radius:4px;">APPLY CALIBRATION</button>
    </div>
</div>

<script>
let calPoints = { 1: { ph: 7.0, raw: null }, 2: { ph: 4.0, raw: null } };

async function captureCal(num) {
    if(!commandChar) return;
    calPoints[num].ph = parseFloat(document.getElementById('cal'+num+'Ph').value);
    await commandChar.writeValue(new TextEncoder().encode("GET_RAW"));
    // The RAW value will come back via the data listener
    window.lastCalNum = num; 
}

// Update your data listener inside connectBLE() to handle RAW:
// ... inside dataC listener ...
if (str.startsWith("RAW:")) {
    let rawVal = parseFloat(str.substring(4));
    calPoints[window.lastCalNum].raw = rawVal;
    document.getElementById('raw' + window.lastCalNum).innerText = rawVal;
}

async function calculateCalibration() {
    let p1 = calPoints[1], p2 = calPoints[2];
    if (p1.raw === null || p2.raw === null) return alert("Sample both buffers first!");

    // Math: Convert Raw to Voltage
    let v1 = p1.raw * (3.3 / 4095);
    let v2 = p2.raw * (3.3 / 4095);

    // Calculate Slope (The 'spread')
    let newSlope = Math.abs((p1.ph - p2.ph) / (v1 - v2));
    
    // Calculate Offset (Finding where pH 7 would be)
    // Offset = rawReadingAtpH7 
    // If Buffer 1 is pH 7, then Offset = p1.raw
    let newOffset = p1.raw + ((p1.ph - 7.0) / ( (3.3/4095) * newSlope ));

    await commandChar.writeValue(new TextEncoder().encode("OFF:" + newOffset.toFixed(1)));
    await commandChar.writeValue(new TextEncoder().encode("SLP:" + newSlope.toFixed(2)));
    alert("Calibrated! Slope: " + newSlope.toFixed(2) + " Offset: " + newOffset.toFixed(0));
}
</script>
