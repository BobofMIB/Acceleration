<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab Pro Multi-Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 10px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 12px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tabs button.active { background: #00d1b2; color: black; }
        .btn-arm { padding: 15px; font-size: 1.2em; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; margin-top:10px; }
        .state-idle { background: #444; color: white; }
        .state-armed { background: #ffdd57; color: black; }
        .stats-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 0.75em; color: #00d1b2; text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .stepper { display: flex; align-items: center; gap: 5px; }
        .stepper button { width: 35px; height: 35px; background: #00d1b2; border: none; border-radius: 4px; font-weight: bold; }
        .stepper input { width: 60px; text-align: center; background: #000; color: white; border: 1px solid #444; height: 31px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        th { background: #333; color: #00d1b2; padding: 8px; }
        td { border: 1px solid #444; padding: 8px; text-align: center; }
        .hidden { display: none; }
        #phUI { display: none; text-align: center; padding: 20px; }
        .live-val { font-size: 4em; font-weight: 900; color: #00d1b2; }
    </style>
</head>
<body>

<div class="card" style="display:flex; justify-content: space-between; align-items: center;">
    <h3 style="margin:0; color:#00d1b2;">Lab Pro Dashboard</h3>
    <button id="bleBtn" style="background:#00d1b2; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;" onclick="connectBLE()">CONNECT</button>
</div>

<div class="card">
    <div class="tabs">
        <button id="tabF" class="active" onclick="setMode('force')">Vary Force</button>
        <button id="tabM" onclick="setMode('mass')">Vary Mass</button>
        <button id="tabPH" onclick="setMode('ph')">pH & Temp</button>
    </div>

    <div id="physicsUI">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="stepper">
                <span style="font-size:0.8em; margin-right:5px;">Input:</span>
                <button onclick="step('manualInput', -0.05)">-</button>
                <input type="number" id="manualInput" value="0.50" step="0.05">
                <button onclick="step('manualInput', 0.05)">+</button>
            </div>
            <input type="number" id="cardLenInput" value="0.05" step="0.001" onchange="updateCardLen()" style="width:70px; background:#000; color:white; border:1px solid #444; border-radius:4px; text-align:center;">
        </div>

        <button id="armBtn" class="btn-arm state-idle" onclick="armSystem()">ARM SYSTEM</button>

        <div class="stats-box">
            <div><div class="stat-label">Slope</div><div id="statSlope" class="stat-val">0.00</div></div>
            <div><div class="stat-label">Points</div><div id="statCount" class="stat-val">0</div></div>
            <div><div class="stat-label">Mean</div><div id="statMean" class="stat-val">0.00</div></div>
            <button onclick="exportCSV()" style="font-size:0.7em; background:#444; color:white; border:none; border-radius:4px;">CSV</button>
        </div>

        <canvas id="physicsChart" style="max-height: 200px;"></canvas>

        <table>
            <thead><tr><th>Mass</th><th>Force</th><th>Accel</th><th>Action</th></tr></thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>

    <div id="phUI">
        <div class="live-val" id="phDisplay">--.-</div>
        <div style="color:#888; font-weight:bold;">pH LEVEL</div>
        <div class="live-val" id="tempDisplay" style="color:#ffdd57; margin-top:20px; font-size:2.5em;">--.-°C</div>
    </div>
</div>

<script>
    let commandChar, chart, currentMode = 'force', forceData = [], massData = [];
    const g = 9.806;

    function step(id, amt) { 
        let el = document.getElementById(id); 
        el.value = (parseFloat(el.value) + amt).toFixed(2); 
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('tabF').className = m === 'force' ? 'active' : '';
        document.getElementById('tabM').className = m === 'mass' ? 'active' : '';
        document.getElementById('tabPH').className = m === 'ph' ? 'active' : '';
        document.getElementById('physicsUI').style.display = m === 'ph' ? 'none' : 'block';
        document.getElementById('phUI').style.display = m === 'ph' ? 'block' : 'none';
        updateDisplay();
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'NanoPhys_S3' }], optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            const dataC = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            commandChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");
            document.getElementById('bleBtn').innerText = "ONLINE";
            await dataC.startNotifications();
            dataC.addEventListener('characteristicvaluechanged', (e) => {
                const str = new TextDecoder().decode(e.target.value);
                if (str.startsWith("PH,")) {
                    if (currentMode !== 'ph') setMode('ph');
                    const p = str.split(',');
                    document.getElementById('phDisplay').innerText = p[1];
                    document.getElementById('tempDisplay').innerText = p[2] + "°C";
                } else {
                    document.getElementById('armBtn').className = "btn-arm state-idle";
                    document.getElementById('armBtn').innerText = "ARM SYSTEM";
                    const [v1, v2, a] = str.split(',').map(Number);
                    const val = parseFloat(document.getElementById('manualInput').value);
                    const entry = { id: Date.now(), accel: a, 
                        mass: currentMode === 'force' ? 0.5 : val, 
                        force: currentMode === 'force' ? val * g : 0.1 * g };
                    if (currentMode === 'force') forceData.push(entry); else massData.push(entry);
                    updateDisplay();
                }
            });
        } catch (err) { console.log(err); }
    }

    function updateDisplay() {
        const data = currentMode === 'force' ? forceData : massData;
        const body = document.getElementById('dataBody');
        body.innerHTML = "";
        data.forEach(p => {
            body.insertAdjacentHTML('afterbegin', `<tr><td>${p.mass}</td><td>${p.force.toFixed(2)}</td><td>${p.accel.toFixed(2)}</td><td><button onclick="remove(${p.id})">X</button></td></tr>`);
        });
        document.getElementById('statCount').innerText = data.length;
        if (data.length > 0) {
            let sx=0, sy=0, sxy=0, sx2=0;
            data.forEach(p => { const x = currentMode === 'force' ? p.force : (1/p.mass); sx+=x; sy+=p.accel; sxy+=x*p.accel; sx2+=x*x; });
            const slope = data.length > 1 ? (data.length*sxy - sx*sy) / (data.length*sx2 - sx*sx) : 0;
            document.getElementById('statSlope').innerText = slope.toFixed(3);
            drawChart(data, slope);
        }
    }

    function drawChart(data, m) {
        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('physicsChart'), {
            type: 'scatter',
            data: { datasets: [{ label: 'Trials', data: data.map(p => ({x: currentMode==='force'?p.force:(1/p.mass), y: p.accel})), backgroundColor: '#00d1b2' },
            { label: 'Fit', data: [{x:0,y:0},{x:5,y:m*5}], type:'line', borderColor:'#ffdd57', fill:false }]},
            options: { scales: { x: { title: { display:true, text: currentMode==='force'?'Force (N)':'1/Mass (1/kg)'} } } }
        });
    }

    async function armSystem() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("ARM")); document.getElementById('armBtn').className="btn-arm state-armed"; document.getElementById('armBtn').innerText="WAITING..."; }
    async function updateCardLen() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("LEN:"+document.getElementById('cardLenInput').value)); }
    function remove(id) { forceData = forceData.filter(p=>p.id!==id); massData = massData.filter(p=>p.id!==id); updateDisplay(); }
    function exportCSV() { 
        let csv = "Mass,Force,Accel\n" + (currentMode==='force'?forceData:massData).map(p=>`${p.mass},${p.force},${p.accel}`).join("\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='data.csv'; a.click();
    }
</script>
</body>
</html>
