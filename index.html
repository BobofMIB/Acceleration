<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 12px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tabs button.active { background: #00d1b2; color: black; }
        .btn-arm { padding: 15px; font-size: 1.2em; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; }
        .state-idle { background: #444; color: white; }
        .state-armed { background: #ffdd57; color: black; }
        .stats-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 0.75em; color: #00d1b2; text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .stepper { display: flex; align-items: center; gap: 5px; }
        .stepper button { width: 40px; height: 40px; background: #00d1b2; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .stepper input { width: 70px; text-align: center; background: #000; color: white; border: 1px solid #444; height: 36px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        th { background: #333; color: #00d1b2; padding: 10px; }
        td { border: 1px solid #444; padding: 10px; text-align: center; }
        #phUI { display: none; text-align: center; }
        .live-ph { font-size: 5em; font-weight: 900; color: #00d1b2; margin: 10px 0; }
        .cal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .cal-row input { width: 60px; background: #000; color: #fff; border: 1px solid #444; padding: 5px; }
        .cal-row button { flex-grow: 1; padding: 8px; background: #444; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card" style="display:flex; justify-content: flex-end;">
    <button id="bleBtn" style="background:#00d1b2; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer;" onclick="connectBLE()">CONNECT DEVICE</button>
</div>

<div class="card">
    <div class="tabs">
        <button id="tabF" class="active" onclick="setMode('force')">Vary Force</button>
        <button id="tabM" onclick="setMode('mass')">Vary Mass</button>
        <button id="tabPH" onclick="setMode('ph')">pH Sensor</button>
    </div>

    <div id="physicsUI">
        <div style="display:flex; gap:20px; margin-bottom:20px; align-items: center; flex-wrap: wrap;">
            <div>
                <div id="inputLabel" style="font-size: 0.8em; margin-bottom: 5px; color:#aaa;">HANGING MASS (kg)</div>
                <div class="stepper">
                    <button onclick="step('manualInput', -0.05)">-</button>
                    <input type="number" id="manualInput" value="0.10" step="0.05">
                    <button onclick="step('manualInput', 0.05)">+</button>
                </div>
            </div>
            <div>
                <div style="font-size: 0.8em; margin-bottom: 5px; color:#aaa;">CARD (m)</div>
                <input type="number" id="cardLenInput" value="0.05" step="0.001" onchange="updateCardLen()" style="width:70px; background:#000; color:white; border:1px solid #444; height:36px; text-align:center;">
            </div>
        </div>

        <button id="armBtn" class="btn-arm state-idle" onclick="armSystem()">ARM PHOTOGATES</button>

        <div class="stats-box">
            <div><div class="stat-label">Slope</div><div id="statSlope" class="stat-val">0.00</div></div>
            <div><div class="stat-label">Points</div><div id="statCount" class="stat-val">0</div></div>
            <div><div class="stat-label" id="meanLabel">Calc Mass</div><div id="statMean" class="stat-val">0.00</div></div>
            <button onclick="exportCSV()" style="background:#444; color:white; border:none; border-radius:4px; font-size:0.7em;">CSV</button>
        </div>

        <canvas id="physicsChart" style="max-height: 200px;"></canvas>

        <table>
            <thead>
                <tr><th id="col1">Hanging (kg)</th><th id="col2">Force (N)</th><th>Accel (m/s²)</th><th>Action</th></tr>
            </thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>

    <div id="phUI">
        <div class="live-ph" id="phDisplay">--.-</div>
        <div style="color:#00d1b2; font-weight:bold; letter-spacing: 2px; margin-bottom:20px;">pH UNITS</div>

        <div class="card" style="text-align:left; background:#111; border: 1px solid #444;">
            <h4 style="margin:0 0 10px 0; color:#ffdd57; font-size: 0.9em;">LIVE CALIBRATION</h4>
            <div class="cal-row">
                <input type="number" id="cal1Ph" value="7.0">
                <button onclick="captureCal(1)">Sample Buffer 1</button>
                <span id="raw1" style="color:#00d1b2; font-weight:bold; min-width:40px;">---</span>
            </div>
            <div class="cal-row">
                <input type="number" id="cal2Ph" value="4.0">
                <button onclick="captureCal(2)">Sample Buffer 2</button>
                <span id="raw2" style="color:#00d1b2; font-weight:bold; min-width:40px;">---</span>
            </div>
            <button onclick="calculateCalibration()" style="width:100%; padding:10px; background:#00d1b2; color:black; font-weight:bold; border:none; border-radius:4px; margin-top:5px;">APPLY CALIBRATION</button>
        </div>
    </div>
</div>

<script>
    let commandChar, chart, currentMode = 'force', forceData = [], massData = [];
    let calPoints = { 1: { ph: 7.0, raw: null }, 2: { ph: 4.0, raw: null } };
    const g = 9.8066;

    function step(id, amt) { 
        let el = document.getElementById(id); 
        el.value = Math.max(0, (parseFloat(el.value) + amt)).toFixed(2); 
    }

    async function setMode(m, fromDevice = false) {
        currentMode = m;
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'force' ? 'tabF' : (m === 'mass' ? 'tabM' : 'tabPH')).classList.add('active');
        
        document.getElementById('physicsUI').style.display = m === 'ph' ? 'none' : 'block';
        document.getElementById('phUI').style.display = m === 'ph' ? 'block' : 'none';

        if (m === 'force') {
            document.getElementById('inputLabel').innerText = "HANGING MASS (kg)";
            document.getElementById('meanLabel').innerText = "CALC MASS (kg)";
            document.getElementById('col1').innerText = "Hanging (kg)";
        } else if (m === 'mass') {
            document.getElementById('inputLabel').innerText = "TOTAL MASS (kg)";
            document.getElementById('meanLabel').innerText = "CALC FORCE (N)";
            document.getElementById('col1').innerText = "Total (kg)";
        }

        if (!fromDevice && commandChar) {
            await commandChar.writeValue(new TextEncoder().encode(m === 'ph' ? "MODE:PH" : "MODE:PHYS"));
        }
        updateDisplay();
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ 
                filters: [{ name: 'NanoPhys_S3' }], 
                optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"] 
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            const dataC = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            commandChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");
            document.getElementById('bleBtn').innerText = "CONNECTED";
            
            await dataC.startNotifications();
            dataC.addEventListener('characteristicvaluechanged', (e) => {
                const str = new TextDecoder().decode(e.target.value);
                if (str === "MODE:PH") setMode('ph', true);
                else if (str === "MODE:PHYS") setMode('force', true);
                else if (str.startsWith("PH:")) {
                    document.getElementById('phDisplay').innerText = str.substring(3);
                } else if (str.startsWith("RAW:")) {
                    let val = str.substring(4);
                    calPoints[window.lastCalNum].raw = parseFloat(val);
                    document.getElementById('raw' + window.lastCalNum).innerText = val;
                } else if (str.startsWith("DAT:")) {
                    document.getElementById('armBtn').className = "btn-arm state-idle";
                    document.getElementById('armBtn').innerText = "ARM PHOTOGATES";
                    const [v1, v2, a] = str.substring(4).split(',').map(Number);
                    const val = parseFloat(document.getElementById('manualInput').value);
                    const entry = { id: Date.now(), accel: a, 
                        mass: currentMode === 'force' ? 0.5 : val, 
                        force: currentMode === 'force' ? val * g : 0.1 * g };
                    if (currentMode === 'force') forceData.push(entry); else massData.push(entry);
                    updateDisplay();
                }
            });
        } catch (err) { console.log(err); }
    }

    function updateDisplay() {
        if (currentMode === 'ph') return;
        const data = currentMode === 'force' ? forceData : massData;
        const body = document.getElementById('dataBody');
        body.innerHTML = "";
        let sumCalc = 0;

        data.forEach(p => {
            const calc = currentMode === 'force' ? (p.force / p.accel) : (p.mass * p.accel);
            sumCalc += calc;
            body.insertAdjacentHTML('afterbegin', `<tr><td>${p.mass}</td><td>${p.force.toFixed(2)}</td><td>${p.accel.toFixed(3)}</td><td><button onclick="remove(${p.id})">X</button></td></tr>`);
        });

        document.getElementById('statCount').innerText = data.length;
        document.getElementById('statMean').innerText = data.length > 0 ? (sumCalc / data.length).toFixed(3) : "0.00";
        if (data.length > 1) {
            let sx=0, sy=0, sxy=0, sx2=0;
            data.forEach(p => { const x = currentMode === 'force' ? p.force : (1/p.mass); sx+=x; sy+=p.accel; sxy+=x*p.accel; sx2+=x*x; });
            const slope = (data.length*sxy - sx*sy) / (data.length*sx2 - sx*sx);
            document.getElementById('statSlope').innerText = slope.toFixed(3);
            drawChart(data, slope);
        }
    }

    function drawChart(data, m) {
        if (chart) chart.destroy();
        const pts = data.map(p => ({x: currentMode==='force'?p.force:(1/p.mass), y: p.accel}));
        chart = new Chart(document.getElementById('physicsChart'), {
            type: 'scatter',
            data: { datasets: [{ label: 'Trials', data: pts, backgroundColor: '#00d1b2' },
            { label: 'Fit', data: [{x:0,y:0},{x:Math.max(...pts.map(p=>p.x),1)*1.2, y:m*Math.max(...pts.map(p=>p.x),1)*1.2}], type:'line', borderColor:'#ffdd57', pointRadius:0 }]},
            options: { scales: { x: { title: { display:true, text: currentMode==='force'?'Force (N)':'1/Mass (1/kg)'} } } }
        });
    }

    async function armSystem() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("ARM")); document.getElementById('armBtn').className="btn-arm state-armed"; document.getElementById('armBtn').innerText="WAITING..."; }
    async function captureCal(n) { window.lastCalNum = n; if(commandChar) await commandChar.writeValue(new TextEncoder().encode("GET_RAW")); }
    
    async function calculateCalibration() {
        let p1 = calPoints[1], p2 = calPoints[2];
        if (!p1.raw || !p2.raw) return alert("Need 2 samples");
        let v1 = p1.raw * (3.3/4095), v2 = p2.raw * (3.3/4095);
        let slope = Math.abs((p1.ph - p2.ph) / (v1 - v2));
        let offset = p1.raw + ((p1.ph - 7.0) / ((3.3/4095) * slope));
        await commandChar.writeValue(new TextEncoder().encode("OFF:" + offset.toFixed(1)));
        await commandChar.writeValue(new TextEncoder().encode("SLP:" + slope.toFixed(2)));
        alert("Calibrated!");
    }

    function remove(id) { forceData = forceData.filter(p=>p.id!==id); massData = massData.filter(p=>p.id!==id); updateDisplay(); }
    function exportCSV() { 
        let csv = "Mass,Force,Accel\n" + (currentMode==='force'?forceData:massData).map(p=>`${p.mass},${p.force},${p.accel}`).join("\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='lab.csv'; a.click();
    }
</script>
</body>
</html>
