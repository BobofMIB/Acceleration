<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AQA Physics: Newton's Second Law</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 12px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tabs button.active { background: #00d1b2; color: black; }
        .btn-arm { padding: 15px; font-size: 1.2em; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; margin-top:10px; }
        .state-idle { background: #444; color: white; }
        .state-armed { background: #ffdd57; color: black; }
        .stats-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 0.65em; color: #00d1b2; text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .input-row { display: flex; gap: 15px; margin-bottom: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75em; color: #aaa; }
        .stepper { display: flex; align-items: center; gap: 5px; }
        .stepper button { width: 35px; height: 35px; background: #333; color: #00d1b2; border: 1px solid #00d1b2; border-radius: 4px; }
        .stepper input { width: 65px; text-align: center; background: #000; color: white; border: 1px solid #444; height: 32px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th { background: #333; color: #00d1b2; padding: 8px; }
        td { border: 1px solid #444; padding: 8px; text-align: center; }
        .fric-control { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 10px; border-radius: 8px; border: 1px dashed #555; }
        #fricValDisp { color: #ffdd57; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" style="display:flex; justify-content: space-between; align-items: center;">
    <div style="color: #ffdd57; font-weight: bold;">AQA RP7 PRO</div>
    <button id="bleBtn" style="background:#00d1b2; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;" onclick="connectBLE()">CONNECT</button>
</div>

<div class="card">
    <div class="tabs">
        <button id="tabF" class="active" onclick="setMode('force')">1. Vary Force</button>
        <button id="tabM" onclick="setMode('mass')">2. Vary Mass</button>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label id="mainInputLabel">HANGER MASS (kg)</label>
            <div class="stepper">
                <button onclick="step('mainInput', -0.01)">-</button>
                <input type="number" id="mainInput" value="0.05" step="0.01">
                <button onclick="step('mainInput', 0.01)">+</button>
            </div>
        </div>
        <div class="input-group" id="massInputGroup" style="visibility: hidden;">
            <label>TOTAL SYSTEM MASS (kg)</label>
            <input type="number" id="totalMassInput" value="0.60" step="0.01" style="background:#000; color:#00d1b2; border:1px solid #444; height:32px; text-align:center; font-weight:bold;">
        </div>
    </div>

    <button id="armBtn" class="btn-arm state-idle" onclick="armSystem()">ARM PHOTOGATES</button>

    <div class="fric-control">
        <div style="font-size:0.8em;">Friction Offset: <span id="fricValDisp">OFF</span></div>
        <input type="checkbox" id="fricToggle" onchange="updateDisplay()" style="width:20px; height:20px; cursor:pointer;">
    </div>

    <div class="stats-box">
        <div><div class="stat-label">Slope</div><div id="statSlope" class="stat-val">0.00</div></div>
        <div><div class="stat-label">Trials</div><div id="statCount" class="stat-val">0</div></div>
        <div><div class="stat-label" id="meanLabel">Calc Mass</div><div id="statMean" class="stat-val">0.00</div></div>
        <button onclick="clearData()" style="background:#cc241d; color:white; border:none; border-radius:4px; font-size:0.7em; font-weight:bold;">CLEAR</button>
    </div>

    <canvas id="physicsChart" style="max-height: 180px;"></canvas>

    <table>
        <thead>
            <tr id="tableHead">
                <th id="colHeader1">Hanger (kg)</th>
                <th id="colHeader2">Net Force (N)</th>
                <th>Accel (m/s²)</th>
                <th>X</th>
            </tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>
</div>

<script>
    let commandChar, chart, currentMode = 'force', forceData = [], massData = [];
    const g = 9.8066;

    function step(id, amt) { 
        let el = document.getElementById(id); 
        el.value = Math.max(0, (parseFloat(el.value) + amt)).toFixed(3); 
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('tabF').classList.remove('active');
        document.getElementById('tabM').classList.remove('active');
        document.getElementById(m === 'force' ? 'tabF' : 'tabM').classList.add('active');
        
        // UI Logic: Hide mass input when varying force
        const mInput = document.getElementById('massInputGroup');
        mInput.style.visibility = (m === 'mass') ? 'visible' : 'hidden';

        document.getElementById('mainInputLabel').innerText = m === 'force' ? "HANGER MASS (kg)" : "HANGER (CONST kg)";
        document.getElementById('meanLabel').innerText = m === 'force' ? "Calc Mass" : "Calc Force";
        
        // Table Headers Update
        document.getElementById('colHeader1').innerText = m === 'force' ? "Hanger (kg)" : "Total Mass (kg)";
        document.getElementById('colHeader2').innerText = m === 'force' ? "Net Force (N)" : "1 / Mass (kg⁻¹)";

        updateDisplay();
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ 
                filters: [{ name: 'NanoPhys_S3' }], 
                optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"] 
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            const dataC = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            commandChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");
            document.getElementById('bleBtn').innerText = "LIVE";
            
            await dataC.startNotifications();
            dataC.addEventListener('characteristicvaluechanged', (e) => {
                const str = new TextDecoder().decode(e.target.value);
                if (str.startsWith("DAT:")) {
                    document.getElementById('armBtn').className = "btn-arm state-idle";
                    document.getElementById('armBtn').innerText = "ARM PHOTOGATES";
                    const [v1, v2, a] = str.substring(4).split(',').map(Number);
                    
                    const mH = parseFloat(document.getElementById('mainInput').value);
                    const mT = parseFloat(document.getElementById('totalMassInput').value);

                    const entry = { id: Date.now(), hanger: mH, total: mT, accel: a, appliedF: mH * g };
                    if (currentMode === 'force') forceData.push(entry); else massData.push(entry);
                    updateDisplay();
                }
            });
        } catch (err) { console.log(err); }
    }

    function updateDisplay() {
        const data = currentMode === 'force' ? forceData : massData;
        const body = document.getElementById('dataBody');
        const useComp = document.getElementById('fricToggle').checked;
        body.innerHTML = "";

        let sx=0, sy=0, sxy=0, sx2=0, n = data.length;
        data.forEach(p => {
            const x = currentMode === 'force' ? p.appliedF : (1/p.total);
            sx+=x; sy+=p.accel; sxy+=x*p.accel; sx2+=x*x;
        });
        
        let slope = n > 1 ? (n*sxy - sx*sy)/(n*sx2 - sx*sx) : 0;
        let intercept = n > 1 ? (sy - slope*sx)/n : 0;
        let fOffset = (slope !== 0) ? (-intercept / slope) : 0;
        if (fOffset < 0) fOffset = 0;

        document.getElementById('fricValDisp').innerText = useComp ? fOffset.toFixed(3) + " N" : "OFF";

        data.forEach(p => {
            const netF = (currentMode === 'force' && useComp) ? (p.appliedF - fOffset) : p.appliedF;
            const xVal = currentMode === 'force' ? p.appliedF : (1/p.total);
            const rowLabel = currentMode === 'force' ? p.hanger : p.total;
            
            body.insertAdjacentHTML('afterbegin', `
                <tr>
                    <td>${rowLabel.toFixed(3)}</td>
                    <td>${(currentMode === 'force' ? netF : xVal).toFixed(3)}</td>
                    <td>${p.accel.toFixed(3)}</td>
                    <td><button onclick="remove(${p.id})">×</button></td>
                </tr>`);
        });

        document.getElementById('statCount').innerText = n;
        document.getElementById('statSlope').innerText = slope.toFixed(3);
        
        // In Force mode: m = 1/slope. In Mass mode: F = slope.
        document.getElementById('statMean').innerText = currentMode === 'force' ? 
            (slope > 0 ? (1/slope).toFixed(3) + " kg" : "0.00") : 
            (slope.toFixed(3) + " N");

        drawChart(data, slope, intercept, fOffset, useComp);
    }

    function drawChart(data, slope, intercept, fOffset, useComp) {
        if (chart) chart.destroy();
        const pts = data.map(p => ({ 
            x: (currentMode === 'force' && useComp) ? (p.appliedF - fOffset) : (currentMode === 'force' ? p.appliedF : (1/p.total)), 
            y: p.accel 
        }));
        
        const maxX = pts.length > 0 ? Math.max(...pts.map(p => p.x)) * 1.2 : 1;
        const lineData = (useComp && currentMode === 'force') 
            ? [{x: 0, y: 0}, {x: maxX, y: slope * maxX}]
            : [{x: 0, y: intercept}, {x: maxX, y: slope * maxX + intercept}];

        const xTitle = currentMode === 'force' ? 
            (useComp ? 'Net Force (N)' : 'Applied Force (N)') : 
            'Inverse Mass (1/kg)';

        chart = new Chart(document.getElementById('physicsChart'), {
            type: 'scatter',
            data: { datasets: [{ data: pts, backgroundColor: '#00d1b2' }, { data: lineData, type: 'line', borderColor: '#ffdd57', pointRadius: 0, borderWidth: 1 }]},
            options: { 
                scales: { 
                    x: { title: { display:true, text: xTitle, color:'#888'}, min:0}, 
                    y: { title: { display:true, text: 'Acceleration (m/s²)', color:'#888'}, min:0}
                }, 
                plugins: { legend: { display: false }}
            }
        });
    }

    async function armSystem() { if(commandChar) await commandChar.writeValue(new TextEncoder().encode("ARM")); document.getElementById('armBtn').className="btn-arm state-armed"; document.getElementById('armBtn').innerText="WAITING..."; }
    function remove(id) { forceData = forceData.filter(p=>p.id!==id); massData = massData.filter(p=>p.id!==id); updateDisplay(); }
    function clearData() { forceData = []; massData = []; updateDisplay(); }
</script>
</body>
</html>
